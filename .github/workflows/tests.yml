name: Tests

on:
  push:
  pull_request:

jobs:
  test-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gjs libglib2.0-bin gir1.2-soup-3.0 gir1.2-secret-1
      - name: Run core test suite
        run: make test-core
